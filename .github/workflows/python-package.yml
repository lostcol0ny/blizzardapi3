# Runs tests + lint on every push, then hands off to release-it.
# release-it bumps the version, tags, pushes, builds the sdist/wheel,
# uploads to PyPI, and cuts a GitHub release — all as one atomic step
# so the git tag, the GitHub release, and the PyPI artifact are always
# the same version.

name: Python package

on:
  push:
    branches: ["main", "master"]
    paths:
      - "**.py"
      - "**.yml"
      - "**.yaml"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"

# Add permissions block
permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest

      - name: Run linters
        run: |
          source .venv/bin/activate
          black --check .
          ruff check .

  release:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install npm dependencies
        run: npm install

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release-it (bump, build, publish to PyPI, tag, release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "pyproject version before: $(grep '^version = ' pyproject.toml | head -n1 | cut -d'\"' -f2)"
          echo "package.json version before: $(node -p "require('./package.json').version")"
          npx release-it --ci
